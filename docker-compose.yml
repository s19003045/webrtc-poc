# 一次把 Phase 1~4 各自跑成獨立服務，對應不同 host 埠。
# 四個容器內部都聽 3000，對外分別映射到 8081~8084。
#
#   啟動：docker compose up -d --build
#   檢視：docker compose ps
#   關閉：docker compose down
#
# 用瀏覽器開 http://localhost:808X（localhost 屬安全來源，攝影機可用）。

services:
  phase-1:
    build:
      context: .
      dockerfile: phase-1/Dockerfile
    ports:
      - "8081:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3

  phase-2:
    build:
      context: .
      dockerfile: phase-2/Dockerfile
    ports:
      - "8082:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3

  phase-3:
    build:
      context: .
      dockerfile: phase-3/Dockerfile
    ports:
      - "8083:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3

  phase-4:
    build:
      context: .
      dockerfile: phase-4/Dockerfile
    ports:
      - "8084:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
