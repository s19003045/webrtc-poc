# 一次把 Phase 1~4 各自跑成獨立服務，對應不同 host 埠。
# 四個容器內部都聽 3000，對外分別映射到 8081~8084。
#
#   啟動：docker compose up -d --build
#   檢視：docker compose ps
#   關閉：docker compose down
#
# 用瀏覽器開 http://localhost:808X（localhost 屬安全來源，攝影機可用）。

services:
  phase-1:
    build:
      context: .
      dockerfile: phase-1/Dockerfile
    ports:
      - "8081:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3

  phase-2:
    build:
      context: .
      dockerfile: phase-2/Dockerfile
    ports:
      - "8082:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3

  phase-3:
    build:
      context: .
      dockerfile: phase-3/Dockerfile
    ports:
      - "8083:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3

  phase-4:
    build:
      context: .
      dockerfile: phase-4/Dockerfile
    ports:
      - "8084:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Phase 5 是 SFU：伺服器要跟 client 交換 RTP(UDP)，所以除了 HTTP/WS 的 TCP 埠，
  # 還要發布一個「固定的 UDP 媒體埠」，並用 NAT1TO1_IP 告訴 Pion 對外要用的可達 IP。
  # NAT1TO1_IP 預設 127.0.0.1（同機瀏覽器）；要從別台機器連，改成本機的區網 IP。
  phase-5:
    build:
      context: .
      dockerfile: phase-5/Dockerfile
    ports:
      - "8085:3000"          # HTTP + WebSocket（信令）
      - "50000:50000/udp"    # WebRTC 媒體（ICE/RTP）
    environment:
      - UDP_PORT=50000
      - NAT1TO1_IP=127.0.0.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
