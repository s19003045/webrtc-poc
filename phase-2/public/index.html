<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC Phase 2 — 多人視訊</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>WebRTC Phase 2 — 多人 Mesh 視訊</h1>
    <p class="hint">開多個分頁、輸入相同房間名稱加入，即可多人通話（mesh，上限 6 人）。點一下任一畫面可放大，雙擊進全螢幕。</p>
  </header>

  <section class="controls">
    <input id="room" type="text" placeholder="房間名稱" value="test" />
    <button id="joinBtn">加入通話</button>
    <button id="micBtn" disabled>🎤 靜音</button>
    <button id="camBtn" disabled>📷 關鏡頭</button>
    <button id="screenBtn" disabled>🖥️ 分享螢幕</button>
    <button id="hangupBtn" disabled>掛斷</button>
    <span id="status" class="status">尚未連線</span>
  </section>

  <div class="layout">
    <main>
      <section class="videos" id="videos">
        <div class="video-box" id="localBox">
          <video id="localVideo" autoplay playsinline muted></video>
          <span class="label">我（本機）</span>
        </div>
        <!-- 遠端視訊格會由 client.js 動態插入這裡之後 -->
      </section>
    </main>

    <aside class="sidebar">
      <section class="participants">
        <h2>成員 <span id="peerCount" class="badge">0 條連線</span></h2>
        <ul id="participantList"></ul>
      </section>

      <section class="chat">
        <h2>聊天（DataChannel）</h2>
        <div id="messages" class="messages"></div>
        <div class="chat-input">
          <input id="chatInput" type="text" placeholder="輸入訊息…" disabled />
          <button id="sendBtn" disabled>送出</button>
        </div>
      </section>
    </aside>
  </div>

  <section class="log">
    <h2>連線流程紀錄</h2>
    <pre id="log"></pre>
  </section>

  <script src="client.js"></script>
</body>
</html>
