<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC 1:1 視訊通話 POC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>WebRTC 1:1 視訊通話 POC</h1>
    <p class="hint">在「兩個分頁」輸入相同房間名稱並加入，即可互打。</p>
  </header>

  <section class="controls">
    <input id="room" type="text" placeholder="房間名稱（例如 test）" value="test" />
    <button id="joinBtn">加入通話</button>
    <button id="hangupBtn" disabled>掛斷</button>
    <span id="status" class="status">尚未連線</span>
  </section>

  <section class="videos">
    <div class="video-box">
      <video id="localVideo" autoplay playsinline muted></video>
      <span class="label">我（本機）</span>
    </div>
    <div class="video-box">
      <video id="remoteVideo" autoplay playsinline></video>
      <span class="label">對方（遠端）</span>
    </div>
  </section>

  <section class="log">
    <h2>連線流程紀錄</h2>
    <pre id="log"></pre>
  </section>

  <script src="client.js"></script>
</body>
</html>
